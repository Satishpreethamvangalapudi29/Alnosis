  <style>

    .medical-card {
      background: var(--card);
      border-radius: calc(var(--radius) + 4px);
      border: 1px solid var(--border);
      padding: 1.5rem;
      box-shadow: var(--shadow-md);
      transition: all 0.3s ease;
    }
    .medical-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.625rem 1rem;
      border-radius: var(--radius);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
      outline: none;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: var(--primary); color: var(--primary-foreground); }
    .btn-primary:hover:not(:disabled) { background: hsl(142, 72%, 35%); }
    .btn-medical { background: linear-gradient(135deg, var(--medical-green) 0%, var(--medical-teal) 100%); color: white; box-shadow: var(--shadow-md); }
    .btn-medical:hover:not(:disabled) { box-shadow: var(--shadow-lg); transform: scale(0.98); }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--foreground); }
    .btn-outline:hover:not(:disabled) { background: var(--muted); }
    .btn-ghost { background: transparent; color: var(--muted-foreground); }
    .btn-ghost:hover { background: var(--muted); color: var(--foreground); }
    .btn-danger { background: var(--medical-red); color: white; }
    .btn-danger:hover:not(:disabled) { background: hsl(0, 72%, 45%); }

    .input {
      width: 100%;
      height: 2.75rem;
      padding: 0.5rem 1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--background);
      font-size: 0.875rem;
      transition: all 0.2s ease;
      outline: none;
    }
    .input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px hsla(142, 72%, 40%, 0.1); }
    .textarea { min-height: 100px; resize: vertical; padding: 0.75rem 1rem; }

    .status-badge {
      display: inline-flex;
      align-items: center;

      padding: 0.25rem 0.625rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 500;

    .status-available { background: var(--medical-green-light); color: var(--medical-green); }
    .status-pending { background: var(--medical-orange-light); color: var(--medical-orange); }
    .status-urgent { background: var(--medical-red-light); color: var(--medical-red); }

    .login-container { min-height: 100vh; display: flex; }

    .login-mobile-logo .logo-icon { width: 3rem; height: 3rem; background: linear-gradient(135deg, var(--medical-green) 0%, var(--medical-teal) 100%); border-radius: calc(var(--radius) + 4px); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 30px hsla(142, 72%, 40%, 0.3); }

    .login-form-header { text-align: center; margin-bottom: 2rem; }

    .login-form-header p { color: var(--muted-foreground); }
    .login-security-badge { display: flex; align-items: center; gap: 0.75rem; padding: 1rem; background: var(--muted); border-radius: calc(var(--radius) + 4px); margin-bottom: 1.5rem; }
    .login-security-icon { width: 3rem; height: 3rem; background: hsla(142, 72%, 40%, 0.1); border-radius: calc(var(--radius) + 4px); display: flex; align-items: center; justify-content: center; }

    .dashboard-container { min-height: 100vh; background: var(--background); }
    .sidebar {
      position: fixed;

      left: 0;
      height: 100%;

    .sidebar-logo { display: flex; align-items: center; gap: 0.75rem; text-decoration: none; color: inherit; }
    .sidebar-logo-icon { width: 2.5rem; height: 2.5rem; background: linear-gradient(135deg, var(--medical-green) 0%, var(--medical-teal) 100%); border-radius: calc(var(--radius) + 4px); display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-md); }

    .sidebar-close:hover { background: var(--muted); }

    .sidebar-user-card img { width: 2.5rem; height: 2.5rem; border-radius: 50%; object-fit: cover; }
    .sidebar-user-card h4 { font-size: 0.875rem; font-weight: 500; }
    .sidebar-user-card p { font-size: 0.75rem; color: var(--muted-foreground); }

    .sidebar-nav-link svg { width: 1.25rem; height: 1.25rem; flex-shrink: 0; }
    .sidebar-footer { padding: 1rem; border-top: 1px solid var(--border); }

    .mobile-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 4rem;
      background: var(--card);

    .main-content { padding-top: 4rem; min-height: 100vh; }
    .main-content-inner { padding: 1rem; }

    .welcome-card { background: linear-gradient(135deg, hsl(142, 72%, 35%) 0%, hsl(174, 72%, 40%) 100%); color: white; position: relative; overflow: hidden; }
    .welcome-card::before { content: ''; position: absolute; top: 0; right: 0; width: 16rem; height: 16rem; background: rgba(255,255,255,0.1); border-radius: 50%; transform: translate(50%, -50%); }

    .stat-icon svg { width: 1.5rem; height: 1.5rem; }
    .stat-value { font-size: 1.5rem; font-weight: 700; }
    .stat-label { font-size: 0.875rem; color: var(--muted-foreground); }

    .page-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.5rem; }
    .page-icon { width: 3rem; height: 3rem; border-radius: calc(var(--radius) + 4px); display: flex; align-items: center; justify-content: center; }

    .emergency-banner { background: var(--medical-red); color: white; }

    /* ==================== SMOOTH ANIMATIONS & TRANSITIONS ==================== */
    /* Global CSS animations: hover effects, fade-ins, and subtle movement without changing layout, colors, or structure */
    
    :root {
      --transition-fast: 140ms;
      --transition-medium: 260ms;
      --transition-slow: 520ms;
      --ease-out: cubic-bezier(0.2, 0.9, 0.2, 1);
    }

    /* Global smooth transitions for interactive elements */
    :is(button, a, .btn, input, select, textarea, .medical-card, img, .card-item, .feature-item) {
      transition: transform var(--transition-medium) var(--ease-out),
                  box-shadow var(--transition-medium) var(--ease-out),
                  opacity var(--transition-fast) var(--ease-out),
                  background-color var(--transition-medium) var(--ease-out);
      will-change: transform, box-shadow;
      -webkit-tap-highlight-color: transparent;
    }

    /* Smooth hover effects for buttons and links */
    :is(.btn, button, a):not(:disabled):hover,
    :is(.btn, button, a):not(:disabled):focus-visible {
      transform: translateY(-2px) scale(1.01);
    }

    :is(.btn, button, a):not(:disabled):active {
      transform: translateY(0) scale(0.98);
    }

    /* Card hover effects - subtle lift and shadow enhancement */
    .medical-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px hsla(210, 40%, 15%, 0.12) !important;
    }

    /* Images and avatar hover - subtle scale */
    :is(img, .avatar):hover {
      transform: scale(1.04);
    }

    /* Input focus states with smooth transition */
    :is(input, select, textarea):focus {
      transform: scale(1.01);
      opacity: 1;
    }

    /* Fade-in animation for page sections on load */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideInLeft {
      from {
        opacity: 0;
        transform: translateX(-16px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes slideInRight {
      from {
        opacity: 0;
        transform: translateX(16px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* Apply fade-in animation to main content sections */
    #app > * {
      animation: fadeInUp var(--transition-slow) var(--ease-out) both;
    }

    /* Stagger animations for grid items and card lists */
    .medical-card, .card-item, .feature-item, .grid > * {
      animation: slideInLeft var(--transition-slow) var(--ease-out) both;
    }

    .grid > *:nth-child(1) { animation-delay: 40ms; }
    .grid > *:nth-child(2) { animation-delay: 80ms; }
    .grid > *:nth-child(3) { animation-delay: 120ms; }
    .grid > *:nth-child(4) { animation-delay: 160ms; }
    .grid > *:nth-child(n+5) { animation-delay: 200ms; }

    /* Subtle background gradient animation (does not change base colors) */
    @keyframes subtleGradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Apply subtle movement to body for depth perception */
    body {
      position: relative;
    }

    /* Optional: animated background movement for visual interest */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(
        120deg,
        rgba(255, 255, 255, 0) 0%,
        rgba(255, 255, 255, 0.01) 50%,
        rgba(255, 255, 255, 0) 100%
      );
      background-size: 200% 200%;
      animation: subtleGradientShift 8s ease-in-out infinite;
      opacity: 0.02;
      mix-blend-mode: overlay;
    }

    /* Smooth scroll behavior */
    html { scroll-behavior: smooth; }

    /* Respect user motion preferences */
    @media (prefers-reduced-motion: reduce) {
      :is(button, a, .btn, input, select, textarea, .medical-card, img, .card-item, .feature-item),
      #app > *,
      .medical-card,
      .card-item,
      .feature-item,
      .grid > *,
      body::before {
        animation: none !important;
        transition: none !important;
      }
      html { scroll-behavior: auto; }
    }
  </style>

    // ==================== RENDER FUNCTIONS ====================
    function render() {
      const app = document.getElementById('app');
      if (!state.isLoggedIn) {
        app.innerHTML = renderLoginPage();
      } else {
        app.innerHTML = renderDashboard();
      }
      attachEventListeners();
    }

    function renderLoginPage() {
      return `
        <div class="login-container">
          <div class="login-left">
            <div class="login-logo">
              <div class="login-logo-icon">${icons.store}</div>
              <div>
                <h1>AInosis</h1>
                <p>Medical Store Portal</p>
              </div>
            </div>
            <div class="login-content">
              <h2>Pharmacy Ecosystem</h2>
              <p>Access prescriptions, dispense medicines, and provide the best pharmaceutical care to your customers.</p>
              <div class="login-features">
                <div class="login-feature">
                  <div class="login-feature-icon">${icons.check}</div>
                  <span>Retrieve prescriptions via Aadhaar</span>
                </div>
                <div class="login-feature">
                  <div class="login-feature-icon">${icons.check}</div>
                  <span>Drug alternatives & interactions</span>
                </div>
                <div class="login-feature">
                  <div class="login-feature-icon">${icons.check}</div>
                  <span>AI-powered drug information</span>
                </div>
                <div class="login-feature">
                  <div class="login-feature-icon">${icons.check}</div>
                  <span>Emergency drug protocols</span>
                </div>
              </div>
            </div>
            <div class="login-footer">
              Use the right Panel for Login and Registration
            </div>
          </div>
          <div class="login-right">
            <div class="login-form-container">
              <div class="login-mobile-logo">
                <div class="logo-icon">${icons.store}</div>
                <div>
                  <h1>AInosis</h1>
                  <p>Medical Store Portal</p>
                </div>
              </div>
              <div class="login-form-header">
                <h2>Welcome Back</h2>
                <p>Sign in to your pharmacy account</p>
              </div>
              <div class="login-security-badge">
                <div class="login-security-icon">${icons.shield}</div>
                <div class="login-security-text">
                  <h4>Secure Authentication</h4>
                  <p>Your data is protected with end-to-end encryption</p>
                </div>
              </div>
              <form class="login-form" id="loginForm">
                <div>
                  <label>PAN Number</label>
                  <input type="text" class="input" id="panNumber" placeholder="ABCDE1234F" value="ABCDE1234F" required>
                  <p class="help-text">Enter your 10-character PAN number</p>
                </div>
                <div>
                  <label>Medical Store ID</label>
                  <input type="text" class="input" id="storeId" placeholder="MED-STORE-XXXX-XXX" value="MED-STORE-2024-001" required>
                  <p class="help-text">Your registered pharmacy ID</p>
                </div>
                <div>
                  <label>Password</label>
                  <input type="password" class="input" id="password" placeholder="Enter password" value="demo123" required>
                </div>
                <button type="submit" class="btn btn-medical w-full">
                  ${icons.store}
                  Sign In to Pharmacy

              </form>
              <p class="login-terms">
                By signing in, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
              </p>
            </div>
          </div>
        </div>
      `;
    }

    function renderDashboard() {
      return `
        <div class="dashboard-container">
          <div class="sidebar-overlay ${state.sidebarOpen ? 'open' : ''}" id="sidebarOverlay"></div>
          <aside class="sidebar ${state.sidebarOpen ? 'open' : ''}" id="sidebar">
            <div class="sidebar-header">
              <a href="#" class="sidebar-logo">
                <div class="sidebar-logo-icon">${icons.store}</div>
                <div>
                  <h1>AInosis</h1>
                  <p>Medical Store</p>
                </div>
              </a>
              <button class="sidebar-close" id="closeSidebar">${icons.x}</button>
            </div>
            <div class="sidebar-user">
              <div class="sidebar-user-card">
                <div style="width: 2.5rem; height: 2.5rem; border-radius: 50%; background: var(--medical-green-light); display: flex; align-items: center; justify-content: center;">
                  ${icons.store}
                </div>
                <div>
                  <h4>${sampleData.store.name}</h4>
                  <p>${sampleData.store.id}</p>
                </div>
              </div>
            </div>
            <nav class="sidebar-nav">
              <ul>
                <li class="sidebar-nav-item">
                  <button class="sidebar-nav-link ${state.currentPage === 'dashboard' ? 'active' : ''}" data-page="dashboard">
                    ${icons.home} Dashboard
                  </button>
                </li>
                <li class="sidebar-nav-item">
                  <button class="sidebar-nav-link ${state.currentPage === 'prescriptions' ? 'active' : ''}" data-page="prescriptions">
                    ${icons.prescription} Prescriptions
                  </button>
                </li>
                <li class="sidebar-nav-item">
                  <button class="sidebar-nav-link ${state.currentPage === 'history' ? 'active' : ''}" data-page="history">
                    ${icons.history} Medical History
                  </button>
                </li>
                <li class="sidebar-nav-item">
                  <button class="sidebar-nav-link ${state.currentPage === 'update' ? 'active' : ''}" data-page="update">
                    ${icons.edit} Update Prescription
                  </button>
                </li>
                <li class="sidebar-nav-item">
                  <button class="sidebar-nav-link ${state.currentPage === 'doctor' ? 'active' : ''}" data-page="doctor">
                    ${icons.doctor} Doctor Details
                  </button>
                </li>
                <li class="sidebar-nav-item">
                  <button class="sidebar-nav-link ${state.currentPage === 'nearby' ? 'active' : ''}" data-page="nearby">
                    ${icons.map} Nearby Services
                  </button>
                </li>
                <li class="sidebar-nav-item">
                  <button class="sidebar-nav-link ${state.currentPage === 'emergency' ? 'active' : ''}" data-page="emergency">
                    ${icons.emergency} Emergency
                  </button>
                </li>
                <li class="sidebar-nav-item">
                  <button class="sidebar-nav-link ${state.currentPage === 'assistant' ? 'active' : ''}" data-page="assistant">
                    ${icons.bot} AI Assistant
                  </button>
                </li>
              </ul>
            </nav>
            <div class="sidebar-footer">
              <button class="btn btn-outline w-full" id="logoutBtn">
                ${icons.logout} Sign Out
              </button>
            </div>
          </aside>
          <header class="mobile-header">
            <button class="mobile-header-btn" id="openSidebar">${icons.menu}</button>
            <div class="mobile-header-logo">
              <div class="logo-icon">${icons.store}</div>
              <span>AInosis</span>
            </div>
            <button class="mobile-header-btn">${icons.user}</button>
          </header>
          <main class="main-content">
            <div class="main-content-inner">
              ${renderCurrentPage()}
            </div>
          </main>
        </div>
      `;
    }

    function renderCurrentPage() {
      switch(state.currentPage) {
        case 'dashboard': return renderDashboardHome();
        case 'prescriptions': return renderPrescriptionsPage();
        case 'history': return renderHistoryPage();
        case 'update': return renderUpdatePage();
        case 'doctor': return renderDoctorPage();
        case 'nearby': return renderNearbyPage();
        case 'emergency': return renderEmergencyPage();
        case 'assistant': return renderAssistantPage();
        default: return renderDashboardHome();
      }
    }

    function renderDashboardHome() {
      const today = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      const pendingCount = sampleData.prescriptions.filter(p => !p.dispensed).length;
      const dispensedCount = sampleData.prescriptions.filter(p => p.dispensed).length;
      
      return `
        <div class="medical-card welcome-card mb-6">
          <div class="welcome-content">
            <p class="welcome-date">${today}</p>
            <h1 class="welcome-title">Welcome, ${sampleData.store.name}</h1>
            <p class="welcome-subtitle">Manage prescriptions and provide quality pharmaceutical care</p>
          </div>
        </div>
        
        <div class="medical-card mb-6">
          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-icon" style="background: var(--medical-orange-light); color: var(--medical-orange);">${icons.prescription}</div>
              <div>
                <div class="stat-value">${pendingCount}</div>
                <div class="stat-label">Pending</div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon" style="background: var(--medical-green-light); color: var(--medical-green);">${icons.check}</div>
              <div>
                <div class="stat-value">${dispensedCount}</div>
                <div class="stat-label">Dispensed</div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon" style="background: var(--medical-blue-light); color: var(--medical-blue);">${icons.user}</div>
              <div>
                <div class="stat-value">${sampleData.patients.length}</div>
                <div class="stat-label">Patients</div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon" style="background: var(--medical-purple-light); color: var(--medical-purple);">${icons.pill}</div>
              <div>
                <div class="stat-value">150+</div>
                <div class="stat-label">Medicines</div>
              </div>
            </div>
          </div>
        </div>
        
        <h2 class="font-bold text-lg mb-4">Recent Prescriptions</h2>
        <div class="grid gap-4">
          ${sampleData.prescriptions.slice(0, 3).map(rx => `
            <div class="medical-card prescription-card">
              <div class="prescription-header">
                <div class="patient-info">
                  <div class="patient-avatar">${icons.user}</div>
                  <div class="patient-details">
                    <h3>${rx.patientName}</h3>
                    <p>Aadhaar: ${rx.patientAadhaar}</p>
                    <div class="patient-meta">
                      <span>${rx.date}</span>
                      <span>${rx.problem}</span>
                    </div>
                  </div>
                </div>
                <span class="status-badge ${rx.dispensed ? 'status-dispensed' : rx.status === 'urgent' ? 'status-urgent' : 'status-pending'}">
                  ${rx.dispensed ? 'Dispensed' : rx.status === 'urgent' ? 'Urgent' : 'Pending'}
                </span>
              </div>
              <div class="doctor-info-card">
                <h4>Prescribed by</h4>
                <p><strong>${rx.doctorName}</strong> - ${rx.doctorSpecialty}</p>
                <p>${rx.doctorHospital}</p>
              </div>
              <div class="flex gap-2">
                <button class="btn btn-primary flex-1" onclick="viewPrescription('${rx.id}')">View Details</button>
                ${!rx.dispensed ? `<button class="btn btn-medical" onclick="dispensePrescription('${rx.id}')">Dispense</button>` : ''}
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderPrescriptionsPage() {
      return `
        <div class="page-header">
          <div class="page-icon" style="background: var(--medical-blue-light); color: var(--medical-blue);">${icons.prescription}</div>
          <div>
            <h1>Retrieve Prescriptions</h1>
            <p>Search patient prescriptions using Aadhaar number</p>
          </div>
        </div>
        
        <div class="search-section">
          <div class="search-box">
            <input type="text" class="input" id="searchAadhaar" placeholder="Enter Aadhaar Number (e.g., 1234-5678-9012)" value="${state.searchAadhaar}">
            <button class="btn btn-primary" onclick="searchPrescription()">${icons.search} Search</button>
          </div>
        </div>
        
        <div id="prescriptionResults">
          ${state.currentPrescription ? renderPrescriptionDetails(state.currentPrescription) : `
            <div class="medical-card text-center p-6">
              <div style="width: 4rem; height: 4rem; margin: 0 auto 1rem; background: var(--muted); border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                ${icons.search}
              </div>
              <h3 class="font-bold mb-2">Search for Prescriptions</h3>
              <p class="text-sm" style="color: var(--muted-foreground);">Enter a patient's Aadhaar number to retrieve their prescriptions</p>
              <div class="mt-4">
                <p class="text-xs" style="color: var(--muted-foreground);">Try: 1234-5678-9012, 2345-6789-0123, or 3456-7890-1234</p>
              </div>
            </div>
          `}
        </div>
      `;
    }

    function renderPrescriptionDetails(rx) {
      const patient = sampleData.patients.find(p => p.aadhaar === rx.patientAadhaar);
      return `
        <div class="medical-card mb-4">
          <div class="prescription-header">
            <div class="patient-info">
              <div class="patient-avatar">${icons.user}</div>
              <div class="patient-details">
                <h3>${rx.patientName}</h3>
                <p>Aadhaar: ${rx.patientAadhaar}</p>
                <div class="patient-meta">
                  <span>Age: ${patient?.age || 'N/A'}</span>
                  <span>Gender: ${patient?.gender || 'N/A'}</span>
                  <span>Blood: ${patient?.bloodGroup || 'N/A'}</span>
                </div>
              </div>
            </div>
            <span class="status-badge ${rx.dispensed ? 'status-dispensed' : rx.status === 'urgent' ? 'status-urgent' : 'status-pending'}">
              ${rx.dispensed ? 'Dispensed' : rx.status === 'urgent' ? 'Urgent' : 'Pending'}
            </span>
          </div>
          
          <div class="doctor-info-card">
            <h4>Prescribing Doctor</h4>
            <p><strong>${rx.doctorName}</strong> - ${rx.doctorSpecialty}</p>
            <p>${rx.doctorHospital}</p>
            <p>Contact: ${rx.doctorPhone}</p>
          </div>
          
          <div class="mb-4">
            <h4 class="font-semibold mb-2">Diagnosis</h4>

    // ==================== EVENT HANDLERS ====================
    function attachEventListeners() {
      // Login form
      const loginForm = document.getElementById('loginForm');
      if (loginForm) {
        loginForm.addEventListener('submit', (e) => {
          e.preventDefault();
          state.isLoggedIn = true;
          render();
        });
      }

      // Sidebar navigation
      document.querySelectorAll('.sidebar-nav-link').forEach(btn => {
        btn.addEventListener('click', () => {
          state.currentPage = btn.dataset.page;
          state.sidebarOpen = false;
          state.currentPrescription = null;
          state.currentHistory = null;
          render();
        });
      });

      // Mobile sidebar
      const openSidebar = document.getElementById('openSidebar');
      const closeSidebar = document.getElementById('closeSidebar');
      const sidebarOverlay = document.getElementById('sidebarOverlay');
      
      if (openSidebar) openSidebar.addEventListener('click', () => { state.sidebarOpen = true; render(); });
      if (closeSidebar) closeSidebar.addEventListener('click', () => { state.sidebarOpen = false; render(); });
      if (sidebarOverlay) sidebarOverlay.addEventListener('click', () => { state.sidebarOpen = false; render(); });

      // Logout
      const logoutBtn = document.getElementById('logoutBtn');
      if (logoutBtn) {
        logoutBtn.addEventListener('click', () => {
          state.isLoggedIn = false;
          state.currentPage = 'dashboard';
          render();
        });
      }

      // Chat input
      const chatInput = document.getElementById('chatInput');
      if (chatInput) {
        chatInput.addEventListener('keypress', (e) => {
          if (e.key === 'Enter') sendMessage();
        });
      }
      // Initialize map when on nearby page
      if (state.currentPage === 'nearby') {
        setTimeout(initHealthcareMap, 100);
      }

      // Map radius input update
      const mapRadiusInput = document.getElementById('mapRadiusInput');
      if (mapRadiusInput) {
        mapRadiusInput.addEventListener('input', (e) => {
          const radiusDisplay = document.getElementById('mapRadius');
          if (radiusDisplay) radiusDisplay.textContent = e.target.value;
        });
      }

      // Map search input enter key
      const mapSearchInput = document.getElementById('mapSearchInput');
      if (mapSearchInput) {
        mapSearchInput.addEventListener('keypress', (e) => {
          if (e.key === 'Enter') searchHealthcareServices();
        });
      }
          }

    // ==================== GLOBAL FUNCTIONS ====================
    window.searchPrescription = function() {
      const aadhaar = document.getElementById('searchAadhaar').value;

      const rx = sampleData.prescriptions.find(p => p.patientAadhaar === aadhaar);

      const rx = sampleData.prescriptions.find(p => p.id === id);
      if (rx) {
        state.searchAadhaar = rx.patientAadhaar;
        state.currentPrescription = rx;
        state.currentPage = 'prescriptions';

    window.dispensePrescription = function(id) {
      const rx = sampleData.prescriptions.find(p => p.id === id);
      if (rx) {
        rx.dispensed = true;
        rx.status = 'dispensed';
        showToast('Prescription marked as dispensed!', 'success');
        render();
      }
    };

    window.showAlternatives = function(drugName) {
      const alternatives = sampleData.drugAlternatives[drugName];
      if (alternatives) {
        alert(`Alternatives for ${drugName}:\n\n${alternatives.map(a => `${a.name} (${a.manufacturer}) - ${a.price}`).join('\n')}`);
      } else {
        alert('No alternatives found for this drug.');
      }

      const aadhaar = document.getElementById('updateAadhaar').value;
      window.searchPrescription.call(null);
    };

    window.searchDrugAlternatives = function() {
      const drug = document.getElementById('drugSearch').value;
      showToast(`Searching for alternatives to ${drug}...`, 'success');
    };

    window.searchDoctor = function() {
      const aadhaar = document.getElementById('doctorAadhaar').value.trim();
      if (!aadhaar) {
        showToast('Please enter an Aadhaar number', 'error');
        return;
      }
      
      // Find doctors who have prescribed for this Aadhaar
      const matchingDoctors = sampleData.doctors.filter(doc => 
        doc.aadhaarPatients.includes(aadhaar)
      );
      
      state.doctorSearchResults = matchingDoctors;
      state.doctorSearched = true;
      
      if (matchingDoctors.length > 0) {
        showToast(`Found ${matchingDoctors.length} doctor(s) for this patient`, 'success');
      } else {
        showToast('No doctors found for this Aadhaar', 'error');
      }
      
      render();
    };

    window.clearDoctorSearch = function() {
      state.doctorSearchResults = [];
      state.doctorSearched = false;
      render();
    };

    window.viewDoctorPrescriptions = function(doctorId) {
      const doctor = sampleData.doctors.find(d => d.id === doctorId);
      if (doctor) {
        showToast(`Viewing prescriptions by ${doctor.name}`, 'success');
      }
    };

    window.selectPredefinedPrescription = function() {
      const select = document.getElementById('predefinedSelect');
      const presetId = select.value;
      
      if (presetId) {
        state.selectedPredefinedPrescription = sampleData.predefinedPrescriptions.find(p => p.id === presetId);
        showToast('Prescription template loaded', 'success');
      } else {
        state.selectedPredefinedPrescription = null;
      }
      
      render();
    };

      const preset = state.selectedPredefinedPrescription;
      if (preset) {
        showToast(`Applied "${preset.title}" prescription template`, 'success');
        // In a real app, this would populate a form or update the current prescription
      }
    };

    window.filterLocations = function(type) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
    };

    window.askQuestion = function(question) {
      document.getElementById('chatInput').value = question;
      sendMessage();
    };

    window.sendMessage = function() {
      const input = document.getElementById('chatInput');
      const message = input.value.trim();
      if (!message) return;
      
      state.chatMessages.push({ role: 'user', content: message });
      
      // Simulate AI response
      setTimeout(() => {
        const responses = {
          'paracetamol': 'Paracetamol (Acetaminophen) is typically dosed at 500-1000mg every 4-6 hours for adults, with a maximum of 4g per day. For children, dosage is based on weight (10-15mg/kg). It\'s used for pain relief and fever reduction. Avoid with liver disease.',
          'aspirin': 'Aspirin can interact with blood thinners (warfarin), NSAIDs, and some blood pressure medications. It may increase bleeding risk. Avoid combining with ibuprofen as it can reduce aspirin\'s cardioprotective effect.',
          'metformin': 'Common side effects of Metformin include: gastrointestinal issues (nausea, diarrhea, stomach pain), metallic taste, and vitamin B12 deficiency with long-term use. Rare but serious: lactic acidosis. Take with food to reduce GI effects.',
          'default': 'I can help you with drug information, dosages, side effects, and interactions. Please ask a specific question about a medication, and I\'ll provide detailed information. Remember to always verify with official pharmaceutical resources.'
        };
        
        let response = responses.default;
        const lowerMsg = message.toLowerCase();
        if (lowerMsg.includes('paracetamol') || lowerMsg.includes('dosage')) response = responses.paracetamol;
        else if (lowerMsg.includes('aspirin') || lowerMsg.includes('interaction')) response = responses.aspirin;
        else if (lowerMsg.includes('metformin') || lowerMsg.includes('side effect')) response = responses.metformin;
        
        state.chatMessages.push({ role: 'assistant', content: response });
        render();
        
        const chatMessages = document.getElementById('chatMessages');
        if (chatMessages) chatMessages.scrollTop = chatMessages.scrollHeight;
      }, 1000);
      
      input.value = '';
      render();
    };

    window.printPrescription = function(id) {
      showToast('Preparing prescription for printing...', 'success');
    };

    function showToast(message, type = 'success') {
      const existing = document.querySelector('.toast-container');
      if (existing) existing.remove();
      
      const container = document.createElement('div');
      container.className = 'toast-container';
      container.innerHTML = `<div class="toast ${type}">${message}</div>`;
      document.body.appendChild(container);
      
      setTimeout(() => container.remove(), 3000);
    }


    // Healthcare Map Functions
    let healthcareMap = null;
    let healthcareMarkers = [];
    let mapCenterMarker = null;
    let mapRadiusCircle = null;

    const healthcareCategories = [
      { amenity: "hospital", label: "Hospitals", color: "#dc2626", emoji: "🏥", active: true },
      { amenity: "dentist", label: "Dentists", color: "#2563eb", emoji: "🦷", active: true },
      { amenity: "clinic", label: "Clinics", color: "#ea580c", emoji: "🧪", active: true },
      { amenity: "pharmacy", label: "Pharmacies", color: "#16a34a", emoji: "💊", active: true },
      { amenity: "doctors", label: "Doctors", color: "#7c3aed", emoji: "👨‍⚕️", active: true }
    ];

    function initHealthcareMap() {
      if (healthcareMap) return;
      
      const mapEl = document.getElementById('healthcareMap');
      if (!mapEl) return;

      healthcareMap = L.map('healthcareMap').setView([17.6868, 83.2185], 13);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap contributors'
      }).addTo(healthcareMap);

      createMapCategoryFilters();
      
      // Try to get user location
      if (navigator.geolocation) {
        healthcareMap.locate({ setView: false, maxZoom: 16 });
        healthcareMap.on('locationfound', (e) => {
          healthcareMap.setView(e.latlng, 14);
        });
      }
    }

    function createMapCategoryFilters() {
      const container = document.getElementById('mapCategoryFilters');
      if (!container) return;
      
      container.innerHTML = '';
      healthcareCategories.forEach((cat, idx) => {
        const btn = document.createElement('button');
        btn.className = 'btn btn-ghost text-xs';
        btn.style.borderColor = cat.color;
        if (cat.active) {
          btn.style.backgroundColor = cat.color;
          btn.style.color = 'white';
        }
        btn.innerHTML = `${cat.emoji} ${cat.label}`;
        btn.onclick = () => toggleMapCategory(idx);
        container.appendChild(btn);
      });
    }

    function toggleMapCategory(idx) {
      healthcareCategories[idx].active = !healthcareCategories[idx].active;
      createMapCategoryFilters();
      
      healthcareMarkers.forEach(m => {
        const cat = healthcareCategories.find(c => c.amenity === m.options.categoryType);
        if (cat) {
          if (cat.active) {
            healthcareMap.addLayer(m);
          } else {
            healthcareMap.removeLayer(m);
          }
        }
      });
    }

    function createHealthcareIcon(label, color, emoji) {
      return L.divIcon({
        className: "custom-marker",
        html: `
          <div style="display: flex; flex-direction: column; align-items: center; transform: translateY(-20px);">
            <div style="width: 34px; height: 34px; background: ${color}; border-radius: 50% 50% 50% 0; transform: rotate(-45deg); border: 3px solid white; box-shadow: 0 0 5px rgba(0,0,0,0.4); position: relative;">
              <div style="position: absolute; transform: rotate(45deg) translate(7px, -2px); font-size: 20px;">${emoji}</div>
            </div>
            <div style="background: white; padding: 3px 8px; font-size: 14px; font-weight: 600; margin-top: 5px; border-radius: 4px; white-space: nowrap; box-shadow: 0 0 4px rgba(0,0,0,0.2); max-width: 200px; overflow: hidden; text-overflow: ellipsis;">${label}</div>
          </div>
        `,
        iconSize: [80, 80],
        iconAnchor: [40, 80]
      });
    }

    async function fetchHealthcareFromOverpass(lat, lon, radiusMeters, amenity) {
      const query = `
    [out:json][timeout:25];
    (
      node["amenity"="${amenity}"](around:${radiusMeters},${lat},${lon});
      way["amenity"="${amenity}"](around:${radiusMeters},${lat},${lon});
      relation["amenity"="${amenity}"](around:${radiusMeters},${lat},${lon});
    );
    out center;
      `.trim();

      try {
        const res = await fetch('https://overpass-api.de/api/interpreter', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: 'data=' + encodeURIComponent(query)
        });

        if (!res.ok) throw new Error(`Overpass API error: ${res.status}`);
        const data = await res.json();
        return data.elements || [];
      } catch (error) {
        console.error(`Error fetching ${amenity}:`, error);
        return [];
      }
    }

    async function geocodeHealthcarePlace(query) {
      const url = 'https://nominatim.openstreetmap.org/search?format=json&limit=1&q=' + encodeURIComponent(query);
      
      try {
        const res = await fetch(url, {
          headers: { 'User-Agent': 'HealthcareFinder/1.0' }
        });
        
        if (!res.ok) throw new Error(`Geocoding error: ${res.status}`);
        const data = await res.json();
        return data;
      } catch (error) {
        console.error('Geocoding error:', error);
        throw new Error('Failed to find location.');
      }
    }

    function clearHealthcareResults() {
      healthcareMarkers.forEach(m => healthcareMap.removeLayer(m));
      healthcareMarkers = [];
      if (mapCenterMarker) {
        healthcareMap.removeLayer(mapCenterMarker);
        mapCenterMarker = null;
      }
      if (mapRadiusCircle) {
        healthcareMap.removeLayer(mapRadiusCircle);
        mapRadiusCircle = null;
      }
    }

    function showHealthcareOnMap(elements, category) {
      elements.forEach(el => {
        let lat = el.lat;
        let lon = el.lon;
        
        if (!lat && el.center) {
          lat = el.center.lat;
          lon = el.center.lon;
        }
        
        if (!lat || !lon) return;

        const name = (el.tags && (el.tags.name || el.tags['name:en'])) || category.label;
        const marker = L.marker([lat, lon], { 
          icon: createHealthcareIcon(name, category.color, category.emoji),
          categoryType: category.amenity
        });

        const addrParts = [];
        if (el.tags) {
          if (el.tags['addr:housenumber']) addrParts.push(el.tags['addr:housenumber']);
          if (el.tags['addr:street']) addrParts.push(el.tags['addr:street']);
          if (el.tags['addr:city']) addrParts.push(el.tags['addr:city']);
        }
        const addr = addrParts.length ? addrParts.join(', ') : 'Address not available';

        const popupHtml = `
          <div style="font-weight:700;margin-bottom:6px;font-size:15px;color:${category.color};">${category.emoji} ${name}</div>
          <div style="font-size:13px;margin-bottom:6px;"><strong>Type:</strong> ${category.label}</div>
          <div style="font-size:13px;margin-bottom:6px;">${addr}</div>
          ${el.tags && el.tags.phone ? `<div style="margin-top:8px;"><strong>Phone:</strong> <a href="tel:${el.tags.phone}">${el.tags.phone}</a></div>` : ''}
          ${el.tags && el.tags.opening_hours ? `<div style="margin-top:4px;font-size:12px;"><strong>Hours:</strong> ${el.tags.opening_hours}</div>` : ''}
        `;
        
        marker.bindPopup(popupHtml);
        
        if (category.active) {
          marker.addTo(healthcareMap);
        }
        
        healthcareMarkers.push(marker);
      });
    }

    window.searchHealthcareServices = async function() {
      const query = document.getElementById('mapSearchInput').value.trim();
      const radius = parseInt(document.getElementById('mapRadiusInput').value) || 3000;
      
      if (!query) {
        showToast('Please enter a location to search', 'error');
        return;
      }

      const indicator = document.getElementById('mapLoadingIndicator');
      if (indicator) indicator.classList.remove('hidden');

      try {
        const places = await geocodeHealthcarePlace(query);
        if (!places || places.length === 0) {
          showToast('Location not found', 'error');
          if (indicator) indicator.classList.add('hidden');
          return;
        }

        const place = places[0];
        const lat = parseFloat(place.lat);
        const lon = parseFloat(place.lon);

        clearHealthcareResults();

        const zoom = Math.min(16, Math.max(13, Math.round(16 - Math.log(radius) / Math.log(2))));
        healthcareMap.setView([lat, lon], zoom);

        mapCenterMarker = L.marker([lat, lon], {
          icon: L.icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
          })
        }).addTo(healthcareMap).bindPopup(`<strong>📍 Search Center</strong><br>${place.display_name}`).openPopup();

        mapRadiusCircle = L.circle([lat, lon], {
          radius: radius,
          color: '#2d7bff',
          fill: false,
          weight: 2,
          dashArray: '6 6'
        }).addTo(healthcareMap);

        let totalFound = 0;
        for (const category of healthcareCategories) {
          const elements = await fetchHealthcareFromOverpass(lat, lon, radius, category.amenity);
          if (elements && elements.length > 0) {
            showHealthcareOnMap(elements, category);
            totalFound += elements.length;
          }
        }

        if (totalFound === 0) {
          showToast(`No healthcare services found within ${radius}m`, 'error');
        } else {
          showToast(`Found ${totalFound} healthcare services`, 'success');
          const group = L.featureGroup([mapRadiusCircle, ...healthcareMarkers.filter(m => healthcareMap.hasLayer(m))]);
          healthcareMap.fitBounds(group.getBounds(), { padding: [60, 60] });
        }

      } catch (err) {
        console.error(err);
        showToast('Error: ' + err.message, 'error');
      } finally {
        if (indicator) indicator.classList.add('hidden');
      }
    };
    // Initialize
    render();
  </script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    .custom-marker {
      background: none !important;
      border: none !important;
    }
  </style>
</body>
</html>
